name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------
  # fork PR ガード（CICD-SEC-02 / self-hosted 汚染防止）
  # --------------------------------------------------
  # `pull_request` トリガーは fork からの PR で fork 側コードを checkout・実行する。
  # 後続ジョブはすべて self-hosted runner で動くため、fork PR をそのまま流すと
  # ランナーホスト上で任意コード実行 (CI poisoning) が成立し得る。
  # このゲートを最初に評価し、fork 由来 PR を fork コードを checkout する前に止める。
  # GitHub-hosted (ubuntu-latest) で動かし checkout を行わないため、判定自体は
  # self-hosted を一切汚染しない。
  fork-guard:
    name: Fork PR guard (CICD-SEC-02)
    runs-on: ubuntu-latest
    steps:
      - name: Reject fork-originated pull requests
        # 同一リポジトリ内ブランチ PR と push では head リポジトリ == base リポジトリ
        # （または非 PR）のため no-op。head リポジトリが base と異なる cross-repository
        # PR（= fork PR）のみ明示 fail し、self-hosted ジョブの起動を抑止する。
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::fork からの pull_request は self-hosted runner 上で" \
            "実行しません (CICD-SEC-02)。メンテナがレビューのうえ承認・再実行" \
            "してください。"
          exit 1

  # --------------------------------------------------
  # スキル構造検証（依存なし・全 PR / push 共通）
  # --------------------------------------------------
  # 各 skills/<name>/SKILL.md の frontmatter (name / description / user-invocable)、
  # name とディレクトリ名の一致、skills-lock.json の JSON 妥当性を bash で検証する。
  structure:
    name: Skill structure check
    # fork PR を self-hosted で実行しないため fork-guard を待つ (CICD-SEC-02)。
    needs: fork-guard
    runs-on: self-hosted
    # bash + grep のみの軽量ジョブ。hang 検知の保険として 5 分で打ち切る。
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        # actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Validate skill structure
        run: bash .github/scripts/check-skill-structure.sh

  # --------------------------------------------------
  # markdownlint（全 markdown の lint）
  # --------------------------------------------------
  # ルール設定は `.markdownlint-cli2.jsonc` を参照する（緑のベースライン構成）。
  markdownlint:
    name: markdownlint
    # fork PR を self-hosted で実行しないため fork-guard を待つ (CICD-SEC-02)。
    needs: fork-guard
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        # actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Setup Node.js
        # actions/setup-node v6.4.0。self-hosted に node 非搭載でも npx を使えるよう導入。
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Run markdownlint-cli2
        # 設定 (globs / ignores / rules) は .markdownlint-cli2.jsonc から自動検出する。
        # サプライチェーン強化のためバージョンを固定する。
        run: npx --yes markdownlint-cli2@0.22.1
